version: '3.8'

services:
  user-service:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: dev-user-service
    working_dir: /app
    command: sh -c "./mvnw spring-boot:run -Dspring-boot.run.profiles=dev"
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
    volumes:
      - .:/app
      - maven-repo:/root/.m2
    ports:
      - "8081:8080"
    networks:
      - bookstore-network

networks:
  bookstore-network:
    external: true

volumes:
  maven-repo:
    name: shared-maven-repo

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/bookstore_user?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SPRING_DATASOURCE_USERNAME:bookstore}
    password: ${SPRING_DATASOURCE_PASSWORD:bookstore}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# RS256 JWT Configuration
app:
  jwt:
    keystore-path: keys/keystore.p12
    keystore-password: ${APP_JWT_KEYSTORE_PASSWORD:bookstore-secret}
    key-alias: jwt
    expiration-ms: 86400000

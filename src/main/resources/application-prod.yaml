spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# RS256 JWT Configuration
app:
  jwt:
    keystore-path: ${APP_JWT_KEYSTORE_PATH:keys/keystore.p12}
    keystore-password: ${APP_JWT_KEYSTORE_PASSWORD:bookstore-secret}
    key-alias: ${APP_JWT_KEY_ALIAS:jwt}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
